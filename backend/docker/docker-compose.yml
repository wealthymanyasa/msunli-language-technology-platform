version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://zilp:zilp_secret@db:5432/zilp
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_MINUTES=30
      - JWT_REFRESH_EXPIRATION_DAYS=7
      - API_RATE_LIMIT=100
      - API_RATE_LIMIT_WINDOW=60
      - CORS_ORIGINS=["*"]
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
    volumes:
      - ..:/app:ro
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zilp_network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=zilp
      - POSTGRES_PASSWORD=zilp_secret
      - POSTGRES_DB=zilp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zilp -d zilp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - zilp_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zilp_network

volumes:
  postgres_data:
  redis_data:

networks:
  zilp_network:
    driver: bridge
