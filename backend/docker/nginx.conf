# =============================================================================
# ZILP — Nginx Reverse Proxy Configuration
# Installed at: /etc/nginx/sites-available/zilp
# Proxy: http://185.162.125.127 → http://127.0.0.1:8000
# =============================================================================

upstream zilp_api {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name 185.162.125.127;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 185.162.125.127;

    ssl_certificate     /etc/nginx/ssl/zilp.crt;
    ssl_certificate_key /etc/nginx/ssl/zilp.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ---------- Security Headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- Request Size ----------
    client_max_body_size 10M;

    # ---------- Root Health ----------
    location = /health {
        proxy_pass http://zilp_api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- API Proxy ----------
    location / {
        proxy_pass http://zilp_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
    }

    # ---------- Error Pages ----------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ---------- Rate Limit Zone ----------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
