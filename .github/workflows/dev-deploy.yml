# =============================================================================
# ZILP — Zimbabwean Indigenous Language Processing Platform
# Dev Branch CI/CD Pipeline
#
# Trigger:    Push to dev branch
# Runner:     Self-hosted (deployerunner) on production server
# Target:     /opt/zilp
# =============================================================================

name: ZILP Dev Deploy

on:
  push:
    branches:
      - dev

concurrency:
  group: zilp-dev-deploy
  cancel-in-progress: true

env:
  DEPLOY_DIR: /opt/zilp
  COMPOSE_FILE: backend/docker/docker-compose.yml
  COMPOSE_PROJECT_NAME: zilp
  HEALTH_ENDPOINT: http://localhost:8000/health
  FRONTEND_HEALTH_ENDPOINT: http://localhost/

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on:
      - self-hosted
      - prod
      - zilp

    steps:
      # ── Step 1: Checkout code from GitHub ──────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Step 2: Sync code to deployment directory ──────────────────────
      - name: Sync to Deployment Directory
        id: sync
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "Synced to commit: $COMMIT_HASH — $COMMIT_MSG"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='.env' \
            "${{ github.workspace }}/" \
            "${{ env.DEPLOY_DIR }}/" || cp -r "${{ github.workspace }}/" "${{ env.DEPLOY_DIR }}/"
        working-directory: ${{ github.workspace }}

      # ── Step 3: Log the deployed commit ─────────────────────────────────
      - name: Log Deployment Commit
        run: |
          echo "============================================"
          echo "  ZILP Deployment"
          echo "  Timestamp:  $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "  Commit:     ${{ steps.sync.outputs.commit_hash }}"
          echo "  Message:    ${{ steps.sync.outputs.commit_message }}"
          echo "  Branch:     dev"
          echo "============================================"
          mkdir -p "${{ env.DEPLOY_DIR }}/deploy-logs"
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') | DEPLOY | ${{ steps.sync.outputs.commit_hash }} | ${{ steps.sync.outputs.commit_message }}" >> "${{ env.DEPLOY_DIR }}/deploy-logs/deployments.log"

      # ── Step 4: Build updated Docker images ─────────────────────────────
      - name: Build Docker Images
        env:
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          REDIS_URL: ${{ vars.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          docker compose -f "${{ env.COMPOSE_FILE }}" build --no-cache api frontend
          echo "Docker images built successfully"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 5: Deploy services (env vars injected at runtime) ──────────
      - name: Deploy Services
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          REDIS_URL: ${{ vars.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          echo "Validating required secrets..."
          : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is not set}"
          : "${DATABASE_URL:?DATABASE_URL is not set}"
          : "${REDIS_URL:?REDIS_URL is not set}"
          : "${JWT_SECRET:?JWT_SECRET is not set}"
          echo "All required variables are set — starting services..."
          docker compose -f "${{ env.COMPOSE_FILE }}" up -d --remove-orphans
          echo "Services restarted"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 6: Wait for services to stabilize ──────────────────────────
      - name: Stabilization Wait
        run: |
          echo "Waiting 15 seconds for services to stabilize..."
          sleep 15
          echo "Checking container status..."
          docker compose -f "${{ env.COMPOSE_FILE }}" ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Checking frontend readiness..."
          curl -s -o /dev/null -w "Frontend HTTP status: %{http_code}\n" "${{ env.FRONTEND_HEALTH_ENDPOINT }}" || echo "Frontend not yet ready"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 7: Health check validation ─────────────────────────────────
      - name: Health Check Validation
        id: health
        run: |
          echo "Validating API health at ${{ env.HEALTH_ENDPOINT }}..."
          MAX_RETRIES=12
          RETRY_INTERVAL=5
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.HEALTH_ENDPOINT }}" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              RESPONSE=$(curl -s "${{ env.HEALTH_ENDPOINT }}")
              echo "Health check passed (attempt $i/$MAX_RETRIES)"
              echo "Response: $RESPONSE"
              echo "status=passed" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Health check returned $HTTP_CODE (attempt $i/$MAX_RETRIES), retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "Health check failed after $MAX_RETRIES attempts"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 8: Post-deployment summary ─────────────────────────────────
      - name: Deployment Summary
        if: always()
        run: |
          echo "============================================"
          echo "  ZILP Deployment Summary"
          echo "============================================"
          echo "  Commit:     ${{ steps.sync.outputs.commit_hash }}"
          echo "  Health:     ${{ steps.health.outputs.status }}"
          echo "  Time:       $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"
          echo ""
          echo "Running containers:"
          docker compose -f "${{ env.COMPOSE_FILE }}" ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Recent deployment log:"
          tail -3 "${{ env.DEPLOY_DIR }}/deploy-logs/deployments.log" 2>/dev/null || echo "no log"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 9: Notify on failure ───────────────────────────────────────
      - name: Deployment Failure
        if: failure()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT FAILED"
          echo "============================================"
          echo "  Commit: ${{ steps.sync.outputs.commit_hash }}"
          echo "  Time:   $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"
          echo ""
          echo "Current container status:"
          docker compose -f "${{ env.COMPOSE_FILE }}" ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Last 20 lines of api logs:"
          docker compose -f "${{ env.COMPOSE_FILE }}" logs --tail=20 api
          echo ""
          echo "Last 20 lines of frontend logs:"
          docker compose -f "${{ env.COMPOSE_FILE }}" logs --tail=20 frontend
          echo ""
          echo "Previous working state preserved. No data was lost."
          echo "To roll back, run: docker compose down && git checkout <last-stable-commit> && docker compose up -d"
        working-directory: ${{ env.DEPLOY_DIR }}
