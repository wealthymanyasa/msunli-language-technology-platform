# =============================================================================
# ZILP — Zimbabwean Indigenous Language Processing Platform
# Dev Branch CI/CD Pipeline
#
# Trigger:    Push to dev branch
# Runner:     Self-hosted (deployerunner) on production server
# Target:     /opt/zilp
# =============================================================================

name: ZILP Dev Deploy

on:
  push:
    branches:
      - dev

concurrency:
  group: zilp-dev-deploy
  cancel-in-progress: true

env:
  DEPLOY_DIR: /opt/zilp
  COMPOSE_FILE: backend/docker/docker-compose.yml
  COMPOSE_PROJECT_NAME: zilp
  HEALTH_ENDPOINT: http://localhost:8000/health

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on:
      - self-hosted
      - prod
      - zilp

    steps:
      # ── Step 1: Checkout code from GitHub ──────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Step 2: Sync code to deployment directory ──────────────────────
      - name: Sync to Deployment Directory
        id: sync
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "Synced to commit: $COMMIT_HASH — $COMMIT_MSG"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='.env' \
            "${{ github.workspace }}/" \
            "${{ env.DEPLOY_DIR }}/" || cp -r "${{ github.workspace }}/" "${{ env.DEPLOY_DIR }}/"
        working-directory: ${{ github.workspace }}

      # ── Step 3: Log the deployed commit ─────────────────────────────────
      - name: Log Deployment Commit
        run: |
          echo "============================================"
          echo "  ZILP Deployment"
          echo "  Timestamp:  $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "  Commit:     ${{ steps.sync.outputs.commit_hash }}"
          echo "  Message:    ${{ steps.sync.outputs.commit_message }}"
          echo "  Branch:     dev"
          echo "============================================"
          mkdir -p "${{ env.DEPLOY_DIR }}/deploy-logs"
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') | DEPLOY | ${{ steps.sync.outputs.commit_hash }} | ${{ steps.sync.outputs.commit_message }}" >> "${{ env.DEPLOY_DIR }}/deploy-logs/deployments.log"

      # ── Step 4: Ensure .env file exists ──────────────────────────────────
      - name: Ensure Environment File
        run: |
          create_env() {
            printf '%s\n' \
              'APP_NAME=ZILP Language Technology Platform' \
              'APP_VERSION=1.0.0' \
              'DEBUG=false' \
              'LOG_LEVEL=INFO' \
              'LOG_FORMAT=json' \
              'POSTGRES_USER=zilp' \
              'POSTGRES_PASSWORD=CHANGE_ME_NOW' \
              'POSTGRES_DB=zilp' \
              'DATABASE_URL=postgresql://zilp:CHANGE_ME_NOW@db:5432/zilp' \
              'REDIS_URL=redis://redis:6379' \
              'JWT_SECRET=CHANGE_ME_TO_A_CRYPTOGRAPHIC_RANDOM_STRING' \
              'JWT_ALGORITHM=HS256' \
              'JWT_EXPIRATION_MINUTES=30' \
              'JWT_REFRESH_EXPIRATION_DAYS=7' \
              'API_RATE_LIMIT=100' \
              'API_RATE_LIMIT_WINDOW=60' \
              'CORS_ORIGINS=["*"]'
          }
          if [ -f "${{ env.DEPLOY_DIR }}/backend/.env" ]; then
            echo "backend/.env already exists — preserving"
          else
            if [ -f "${{ env.DEPLOY_DIR }}/backend/.env.production" ]; then
              cp "${{ env.DEPLOY_DIR }}/backend/.env.production" "${{ env.DEPLOY_DIR }}/backend/.env"
              echo "Created backend/.env from .env.production template"
            else
              create_env > "${{ env.DEPLOY_DIR }}/backend/.env"
              echo "Created backend/.env with default placeholder values"
            fi
            echo "!!! IMPORTANT: Edit backend/.env with real secrets !!!"
          fi
          if [ ! -f "${{ env.DEPLOY_DIR }}/.env" ]; then
            cp "${{ env.DEPLOY_DIR }}/backend/.env" "${{ env.DEPLOY_DIR }}/.env"
            echo "Also created .env at project root for Docker Compose variable resolution"
          fi
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 5: Build updated Docker images ─────────────────────────────
      - name: Build Docker Images
        run: |
          docker compose -f "${{ env.COMPOSE_FILE }}" build --no-cache api
          echo "Docker images built successfully"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 6: Restart services ────────────────────────────────────────
      - name: Restart Services
        run: |
          docker compose -f "${{ env.COMPOSE_FILE }}" up -d --remove-orphans
          echo "Services restarted"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 7: Wait for services to stabilize ──────────────────────────
      - name: Stabilization Wait
        run: |
          echo "Waiting 15 seconds for services to stabilize..."
          sleep 15
          echo "Checking container status..."
          docker compose -f "${{ env.COMPOSE_FILE }}" ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 8: Health check validation ─────────────────────────────────
      - name: Health Check Validation
        id: health
        run: |
          echo "Validating API health at ${{ env.HEALTH_ENDPOINT }}..."
          MAX_RETRIES=12
          RETRY_INTERVAL=5
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.HEALTH_ENDPOINT }}" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              RESPONSE=$(curl -s "${{ env.HEALTH_ENDPOINT }}")
              echo "Health check passed (attempt $i/$MAX_RETRIES)"
              echo "Response: $RESPONSE"
              echo "status=passed" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Health check returned $HTTP_CODE (attempt $i/$MAX_RETRIES), retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          echo "Health check failed after $MAX_RETRIES attempts"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 9: Post-deployment summary ─────────────────────────────────
      - name: Deployment Summary
        if: always()
        run: |
          echo "============================================"
          echo "  ZILP Deployment Summary"
          echo "============================================"
          echo "  Commit:     ${{ steps.sync.outputs.commit_hash }}"
          echo "  Health:     ${{ steps.health.outputs.status }}"
          echo "  Time:       $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"
          echo ""
          echo "Running containers:"
          docker compose -f "${{ env.COMPOSE_FILE }}" ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Recent deployment log:"
          tail -3 "${{ env.DEPLOY_DIR }}/deploy-logs/deployments.log" 2>/dev/null || echo "no log"
        working-directory: ${{ env.DEPLOY_DIR }}

      # ── Step 10: Notify on failure ──────────────────────────────────────
      - name: Deployment Failure
        if: failure()
        run: |
          echo "============================================"
          echo "  DEPLOYMENT FAILED"
          echo "============================================"
          echo "  Commit: ${{ steps.sync.outputs.commit_hash }}"
          echo "  Time:   $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================"
          echo ""
          echo "Current container status:"
          docker compose -f "${{ env.COMPOSE_FILE }}" ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Last 20 lines of api logs:"
          docker compose -f "${{ env.COMPOSE_FILE }}" logs --tail=20 api
          echo ""
          echo "Previous working state preserved. No data was lost."
          echo "To roll back, run: docker compose down && git checkout <last-stable-commit> && docker compose up -d"
        working-directory: ${{ env.DEPLOY_DIR }}
